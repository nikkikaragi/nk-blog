<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Change page title here -->
  <title>NK Blog — About</title>

  <link rel="stylesheet" href="styles/fonts.css">
  <link rel="stylesheet" href="styles/colors.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/banner.css">
  <link rel="stylesheet" href="styles/about.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>

<body>

  <!-- Banner injected here -->
  <div id="site-header"></div>

  <!-- =====================================================
       ABOUT PAGE CONTENT
       Edit everything below — photo, heading, and bio text.
       ===================================================== -->
  <main class="page-content">

    <div class="about-card">

      <div class="about-photo">
        <div class="about-slideshow">
          <div class="slideshow-track" id="slideshow-track">
            <img src="assets/images/about/purple_selfie.jpg" alt="Purple selfie">
            <img src="assets/images/about/me_spetses.jpg" alt="Me in Spetses">
            <img src="assets/images/about/young_me_eating.jpg" alt="Young me eating">
          </div>
          <button class="slide-btn slide-prev" id="slide-prev">&#8249;</button>
          <button class="slide-btn slide-next" id="slide-next">&#8250;</button>
          <div class="slideshow-dots" id="slideshow-dots"></div>
        </div>
      </div>

      <!-- ---- ABOUT TEXT ---- -->
      <div class="about-text">

        <!-- Change heading here -->
        <h1 class="about-heading">About Me</h1>

        <!-- Change your bio text here -->
        <p class="about-body">
          Hey, my name is Nektaria and I am a 21 year old navigating post-grad life with 
          some extra time on my hands! This is my blog to share all things lifestyle, 
          food, fitness, fashion, and more. I hope you enjoy. 
        </p>

        <!-- Add more paragraphs below if needed: -->
        <!--
        <p class="about-body">
          Second paragraph goes here...
        </p>
        -->

      </div>

    </div>

  </main>

  <!-- Scripts -->
  <script src="scripts/posts-data.js"></script>
  <script src="scripts/topics-data.js"></script>
  <script>var ROOT_PATH = '';</script>
  <script src="scripts/banner-html.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var track   = document.getElementById('slideshow-track');
      var dotsBox = document.getElementById('slideshow-dots');
      if (!track) return;

      var images  = track.querySelectorAll('img');
      var total   = images.length;
      var current = 0;

      images.forEach(function (_, i) {
        var dot = document.createElement('button');
        dot.className = 'slideshow-dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', 'Go to photo ' + (i + 1));
        dot.addEventListener('click', function () { goTo(i); });
        dotsBox.appendChild(dot);
      });

      function goTo(index) {
        current = (index + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        dotsBox.querySelectorAll('.slideshow-dot').forEach(function (d, i) {
          d.classList.toggle('active', i === current);
        });
      }

      document.getElementById('slide-prev').addEventListener('click', function () { goTo(current - 1); });
      document.getElementById('slide-next').addEventListener('click', function () { goTo(current + 1); });

    });
  </script>

</body>
</html>
